<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Comitê de Resultados CX — Junho 2026</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');

  * { box-sizing: border-box; }

  body {
    background: #111; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    height: 100vh; margin: 0; overflow: hidden; font-family: 'Inter', sans-serif;
  }

  #scale-wrapper {
    width: 1280px; height: 720px;
    transform-origin: center center;
    box-shadow: 0 10px 40px rgba(0,0,0,0.9);
    background: #fff;
  }

  iframe { width: 100%; height: 100%; border: none; display: block; }

  /* ================= CONTROLES DISCRETOS ================= */
  .controls {
    position: fixed; bottom: 15px; right: 15px;
    display: flex; align-items: center; gap: 8px; z-index: 1000;
    background: rgba(0, 12, 54, 0.6); backdrop-filter: blur(4px);
    padding: 6px 12px; border-radius: 8px;
    border: 1px solid rgba(255,255,255,0.1);
    transition: opacity 0.3s ease;
  }
  .controls:not(:hover) { opacity: 0.5; }

  .btn-control {
    background: transparent; color: rgba(255,255,255,0.8);
    border: 1px solid rgba(255,255,255,0.2); border-radius: 4px;
    padding: 4px 10px; font-size: 11px; font-weight: 600;
    cursor: pointer; transition: all 0.2s;
  }
  .btn-control:hover { background: rgba(255,255,255,0.2); color: #fff; }

  .btn-pdf { color: #a3ff00; border-color: rgba(163, 255, 0, 0.3); }
  .btn-pdf:hover { background: rgba(163, 255, 0, 0.15); color: #a3ff00; }

  #counter { color: white; font-size: 11px; font-weight: 700; width: 40px; text-align: center; letter-spacing: 1px;}

  /* ================= BOTÃO DO AGENTE IA ================= */
  #ia-fab {
    position: fixed; bottom: 15px; left: 15px; z-index: 1000;
    background: linear-gradient(135deg, #1a56db, #0033b0);
    color: #fff; border: none; border-radius: 50px;
    padding: 12px 18px; font-family: 'Inter', sans-serif; font-weight: 700; font-size: 13px;
    display: flex; align-items: center; gap: 8px; cursor: pointer;
    box-shadow: 0 6px 20px rgba(0,0,0,0.5);
    transition: transform 0.2s ease;
  }
  #ia-fab:hover { transform: translateY(-2px); }

  #ia-panel {
    position: fixed; bottom: 75px; left: 15px; z-index: 1001;
    width: 360px; max-width: calc(100vw - 30px); height: 480px; max-height: 70vh;
    background: #fff; border-radius: 12px; box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    display: none; flex-direction: column; overflow: hidden;
    font-family: 'Inter', sans-serif;
  }
  #ia-panel.aberto { display: flex; }

  #ia-header {
    background: #000c36; color: #fff; padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    font-weight: 700; font-size: 13px;
  }
  #ia-header .fechar { cursor: pointer; opacity: 0.7; font-size: 16px; }
  #ia-header .fechar:hover { opacity: 1; }

  #ia-mensagens {
    flex: 1; overflow-y: auto; padding: 14px; background: #f4f5f8;
    display: flex; flex-direction: column; gap: 10px;
  }
  .msg { max-width: 85%; padding: 9px 12px; border-radius: 10px; font-size: 13px; line-height: 1.45; white-space: pre-wrap; }
  .msg.user { align-self: flex-end; background: #1a56db; color: #fff; border-bottom-right-radius: 2px; }
  .msg.bot { align-self: flex-start; background: #e5e7eb; color: #111827; border-bottom-left-radius: 2px; }
  .msg.bot.loading { color: #6b7280; font-style: italic; }

  #ia-input-row { display: flex; border-top: 1px solid #e5e7eb; }
  #ia-input {
    flex: 1; border: none; padding: 12px; font-size: 13px; font-family: 'Inter', sans-serif; outline: none;
  }
  #ia-enviar {
    border: none; background: #1a56db; color: #fff; padding: 0 16px; cursor: pointer; font-weight: 700;
  }
  #ia-enviar:hover { background: #0033b0; }
  #ia-enviar:disabled { background: #9ca3af; cursor: not-allowed; }
</style>
</head>
<body>

<div id="scale-wrapper">
  <iframe id="tela" src="slide_01.html"></iframe>
</div>

<div class="controls">
  <button class="btn-control btn-pdf" id="btn-pdf" onclick="gerarPDF()" title="Exportar todos os slides">📥 PDF</button>
  <div style="width: 1px; height: 14px; background: rgba(255,255,255,0.2); margin: 0 4px;"></div>
  <button class="btn-control" onclick="mudarSlide(-1)">❮</button>
  <span id="counter">1/1</span>
  <button class="btn-control" onclick="mudarSlide(1)">❯</button>
  <button class="btn-control" onclick="document.documentElement.requestFullscreen()" title="Tela Cheia">⛶</button>
</div>

<!-- ===== AGENTE DE IA ===== -->
<button id="ia-fab" onclick="toggleIA()">🤖 Pergunte à IA</button>

<div id="ia-panel">
  <div id="ia-header">
    <span>🤖 Agente CX — Comitê Junho 2026</span>
    <span class="fechar" onclick="toggleIA()">✕</span>
  </div>
  <div id="ia-mensagens">
    <div class="msg bot">Olá! Posso responder qualquer pergunta sobre os dados desta apresentação (NS, custos, BPO, motivos de contato, Reclame Aqui e mais). O que você quer saber?</div>
  </div>
  <div id="ia-input-row">
    <input id="ia-input" type="text" placeholder="Ex: qual foi o custo unitário em junho?" onkeydown="if(event.key==='Enter') enviarPergunta();">
    <button id="ia-enviar" onclick="enviarPergunta()">Enviar</button>
  </div>
</div>

<script>
  function resize() {
    const scale = Math.min(window.innerWidth / 1280, window.innerHeight / 720);
    document.getElementById('scale-wrapper').style.transform = `scale(${scale})`;
  }
  window.addEventListener('resize', resize); resize();

  // LISTA DE SLIDES (1 a 36 — obs: slide_06 está ausente no repositório de origem)
  const slides = [
    "slide_01.html","slide_02.html","slide_03.html","slide_04.html","slide_05.html",
    "slide_06.html","slide_07.html","slide_08.html","slide_09.html","slide_10.html",
    "slide_11.html","slide_12.html","slide_13.html","slide_14.html","slide_15.html",
    "slide_16.html","slide_17.html","slide_18.html","slide_19.html","slide_20.html",
    "slide_21.html","slide_22.html","slide_23.html","slide_24.html","slide_25.html",
    "slide_26.html","slide_27.html","slide_28.html","slide_29.html","slide_30.html"
  ];

  let atual = 0;
  const iframe = document.getElementById('tela');
  const counter = document.getElementById('counter');

  function atualizarTela() {
    iframe.src = slides[atual];
    counter.innerText = `${atual + 1}/${slides.length}`;
  }

  function mudarSlide(dir) {
    atual += dir;
    if(atual < 0) atual = 0;
    if(atual >= slides.length) atual = slides.length - 1;
    atualizarTela();
  }

  document.addEventListener('keydown', (e) => {
    if(e.key === 'ArrowRight') mudarSlide(1);
    if(e.key === 'ArrowLeft') mudarSlide(-1);
  });

  atualizarTela();

  // MOTOR DE IMPRESSÃO
  function gerarPDF() {
    const btn = document.getElementById('btn-pdf');
    btn.innerText = "⏳ Gerando...";

    const printWindow = window.open('', '_blank');

    let htmlContent = `
      <!DOCTYPE html>
      <html>
      <head>
        <title>Deck Comitê CX - PDF</title>
        <style>
          @page { size: 1280px 720px landscape; margin: 0; }
          body { margin: 0; padding: 0; background: #fff; }
          * { -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
          iframe { width: 1280px; height: 720px; border: none; display: block; page-break-after: always; }
        </style>
      </head>
      <body>
    `;

    slides.forEach(slide => {
      htmlContent += `<iframe src="${slide}"></iframe>`;
    });

    htmlContent += `
        <script>
          window.onload = () => {
            setTimeout(() => { window.print(); }, 2000);
          };
        <\/script>
      </body>
      </html>
    `;

    printWindow.document.write(htmlContent);
    printWindow.document.close();

    setTimeout(() => { btn.innerText = "📥 PDF"; }, 2000);
  }

  // ===== LÓGICA DO AGENTE DE IA =====
  const historico = [];

  function toggleIA() {
    document.getElementById('ia-panel').classList.toggle('aberto');
  }

  async function enviarPergunta() {
    const input = document.getElementById('ia-input');
    const pergunta = input.value.trim();
    if (!pergunta) return;

    const mensagens = document.getElementById('ia-mensagens');
    const enviarBtn = document.getElementById('ia-enviar');

    mensagens.innerHTML += `<div class="msg user"></div>`;
    mensagens.lastElementChild.textContent = pergunta;
    input.value = '';
    enviarBtn.disabled = true;

    mensagens.innerHTML += `<div class="msg bot loading" id="ia-loading">Pensando...</div>`;
    mensagens.scrollTop = mensagens.scrollHeight;

    historico.push({ role: 'user', content: pergunta });

    try {
      const resp = await fetch('/.netlify/functions/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: historico })
      });
      const data = await resp.json();
      const loadingEl = document.getElementById('ia-loading');

      if (!resp.ok || data.error) {
        loadingEl.remove();
        mensagens.innerHTML += `<div class="msg bot">⚠️ ${data.error || 'Erro ao consultar a IA.'}</div>`;
      } else {
        loadingEl.remove();
        mensagens.innerHTML += `<div class="msg bot"></div>`;
        mensagens.lastElementChild.textContent = data.reply;
        historico.push({ role: 'assistant', content: data.reply });
      }
    } catch (err) {
      const loadingEl = document.getElementById('ia-loading');
      if (loadingEl) loadingEl.remove();
      mensagens.innerHTML += `<div class="msg bot">⚠️ Não foi possível conectar ao agente. Tente novamente.</div>`;
    }

    enviarBtn.disabled = false;
    mensagens.scrollTop = mensagens.scrollHeight;
  }
</script>
</body>
</html>
